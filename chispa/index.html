<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Spark — un juego para descubrir para qué brillas · a game to discover what makes you shine. 100% offline.">
<title>Spark</title>
<style>
/* ====== Tema "Cielo de Chispa" (Midnight Galaxy + Golden Hour, custom) ====== */
:root{
  --night1:#2a2058; --night2:#171233; --nebula:#3b2d79;
  --card:#272052; --card-edge:#4a3f96; --card-inner:#211a49;
  --text:#f7f4ff; --muted:#bfb3ea;
  --gold1:#ffe9a3; --gold2:#ffce4f; --gold3:#ffb347; --gold-deep:#b96e00;
  --violet1:#8b7cf7; --violet2:#6c5ce7; --violet-deep:#4636b8;
  --pink:#ff8fb1; --teal:#7fe3ff; --green:#7ddf8e;
  --focus:#7fe3ff;
  --round:'Arial Rounded MT Bold','SF Pro Rounded','Trebuchet MS',Verdana,sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:ui-rounded,var(--round);
  background:
    radial-gradient(1200px 700px at 75% -10%, #45358c55 0%, transparent 60%),
    radial-gradient(900px 600px at 10% 110%, #6c5ce733 0%, transparent 55%),
    linear-gradient(180deg,var(--night1) 0%,var(--night2) 100%);
  background-attachment:fixed;
  color:var(--text); min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:18px 16px 28px; line-height:1.5;
}
/* Capa de estrellas fijas */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1.5px 1.5px at 12% 20%,#fff9 50%,transparent 51%),
    radial-gradient(1px 1px at 30% 8%,#fff7 50%,transparent 51%),
    radial-gradient(2px 2px at 48% 28%,#ffce4f88 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 66% 12%,#fff8 50%,transparent 51%),
    radial-gradient(1px 1px at 84% 24%,#fff6 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 92% 60%,#fff7 50%,transparent 51%),
    radial-gradient(1px 1px at 8% 70%,#fff6 50%,transparent 51%),
    radial-gradient(2px 2px at 74% 82%,#ffce4f66 50%,transparent 51%),
    radial-gradient(1px 1px at 22% 48%,#fff5 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 55% 66%,#ff8fb155 50%,transparent 51%);
}
/* Capa de estrellas que titilan */
body::after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1.5px 1.5px at 18% 34%,#fff8 50%,transparent 51%),
    radial-gradient(2px 2px at 62% 44%,#7fe3ff77 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 88% 12%,#fff7 50%,transparent 51%),
    radial-gradient(1px 1px at 40% 78%,#fff6 50%,transparent 51%),
    radial-gradient(2px 2px at 6% 12%,#ffce4f77 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 96% 84%,#ff8fb166 50%,transparent 51%);
  animation:twinkle 3.4s ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:.25}to{opacity:1}}

#app{position:relative; z-index:1; width:100%; max-width:640px}
.card{
  position:relative;
  background:linear-gradient(180deg,#2d2560 0%,var(--card) 55%,#241d4e 100%);
  border:1px solid #5647ab66; border-radius:28px;
  padding:26px 22px;
  box-shadow:0 24px 60px -18px #000c, 0 2px 0 #ffffff14 inset, 0 -18px 40px -28px var(--violet2) inset;
}
.center{text-align:center}
h1,h2{font-size:1.6rem; line-height:1.25; margin-bottom:8px; outline:none; letter-spacing:.2px}
.game-title{
  font-size:3rem; letter-spacing:1.5px; margin:4px 0 2px;
  background:linear-gradient(180deg,var(--gold1) 15%,var(--gold2) 55%,var(--gold3) 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:var(--gold2);
  filter:drop-shadow(0 3px 10px #ffb34744);
}
.title-alt{
  display:block; font-size:1rem; font-weight:normal; letter-spacing:4px;
  text-transform:uppercase; color:var(--muted);
  -webkit-text-fill-color:var(--muted); filter:none; margin-top:2px;
}
.subtitle{color:var(--muted); font-size:1.12rem; margin:10px 0 22px}
.hint{color:var(--muted); font-size:1rem; margin-bottom:10px}
.privacy{color:var(--muted); font-size:.82rem; margin-top:20px; opacity:.8}
.name-label{display:block; font-size:.98rem; color:var(--muted); margin-bottom:7px}
.name-input{
  width:min(300px,100%); font-family:inherit; font-size:1.15rem; padding:12px 16px;
  border-radius:16px; border:2px solid #5647ab; background:var(--card-inner);
  color:var(--text); text-align:center; margin-bottom:20px;
  box-shadow:0 2px 10px #0006 inset; transition:border-color .2s;
}
.name-input:focus{border-color:var(--gold2)}

/* ---------- Botones ---------- */
.btn{
  font-family:inherit; font-size:1.05rem; color:var(--text);
  background:linear-gradient(180deg,var(--violet1),var(--violet2));
  border:none; border-radius:16px; padding:12px 18px;
  cursor:pointer; min-height:48px; touch-action:manipulation;
  box-shadow:0 4px 0 var(--violet-deep), 0 8px 18px -6px #0009;
  transition:transform .12s ease, box-shadow .12s ease, filter .15s;
}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--violet-deep), 0 4px 10px -6px #0009}
.btn-big{
  display:block; width:100%; font-size:1.3rem; font-weight:bold; padding:17px;
  margin:12px 0; border-radius:20px; color:#3f2a00;
  background:linear-gradient(180deg,var(--gold1) 0%,var(--gold2) 55%,var(--gold3) 100%);
  box-shadow:0 5px 0 var(--gold-deep), 0 14px 28px -8px #ffb34766, 0 1px 0 #fff8 inset;
  text-shadow:0 1px 0 #fff6;
}
.btn-big:active{transform:translateY(4px); box-shadow:0 1px 0 var(--gold-deep), 0 6px 14px -8px #ffb34766}
.btn-soft{
  background:linear-gradient(180deg,#463a8d,#392f75);
  font-size:.95rem; box-shadow:0 3px 0 #241d52, 0 6px 14px -6px #0008;
}
.btn-soft:active{transform:translateY(2px); box-shadow:0 1px 0 #241d52}
.glow{animation:breathe 2.2s ease-in-out infinite}
@keyframes breathe{
  0%,100%{box-shadow:0 5px 0 var(--gold-deep), 0 0 18px #ffce4f55}
  50%{box-shadow:0 5px 0 var(--gold-deep), 0 0 34px #ffce4faa}
}
:where(button,input,textarea,a):focus-visible{
  outline:3px solid var(--focus); outline-offset:3px;
}

.row-top{display:flex; align-items:center; gap:14px; margin-bottom:16px}
.row-top h1{margin-bottom:2px}

/* ---------- Mapa de islas ---------- */
.island-grid{
  list-style:none; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px; margin:16px 0 6px;
}
.island-btn{
  --isl:#ffce4f;
  position:relative; width:100%; font-family:inherit; font-size:1rem; color:var(--text);
  background:linear-gradient(180deg,#2e2663,#241d4e);
  border:1px solid #5647ab55; border-radius:22px;
  padding:16px 8px 15px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:9px; min-height:168px; touch-action:manipulation;
  box-shadow:0 10px 22px -10px #000a;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.island-btn:hover:not(:disabled){
  transform:translateY(-4px);
  border-color:var(--isl);
  box-shadow:0 16px 30px -10px #000b, 0 0 22px -4px var(--isl);
}
.island-btn:active:not(:disabled){transform:translateY(-1px)}
.island-bubble{
  width:96px; height:96px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 32% 26%, #ffffff26 0%, transparent 42%),
             radial-gradient(circle at 50% 115%, var(--isl) -40%, #201a45 70%);
  border:2.5px solid var(--isl);
  box-shadow:0 6px 16px -6px #000b, 0 0 0 5px color-mix(in srgb, var(--isl) 16%, transparent);
}
.island-btn.done{cursor:default; border-style:dashed; opacity:.92}
.island-btn.done .island-bubble{filter:saturate(.45) brightness(.75)}
.island-btn.done .island-name{color:var(--muted)}
.island-name{font-weight:bold; line-height:1.2}
.island-star{
  position:absolute; top:-9px; right:-6px; font-size:1.5rem;
  filter:drop-shadow(0 2px 6px #ffce4f88);
}
.progress-wrap{display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:12px}
.progress-stars{display:flex; gap:8px; font-size:1.25rem; letter-spacing:2px}
.progress-stars .on{filter:drop-shadow(0 0 6px #ffce4faa)}
.progress-stars .off{opacity:.28; filter:grayscale(1)}
.progress-note{text-align:center; color:var(--muted); font-size:.95rem}

/* ---------- Escenas ---------- */
.scene-art{
  flex:0 0 auto; width:96px; height:96px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 32% 26%, #ffffff22 0%, transparent 42%),
             radial-gradient(circle at 50% 115%, var(--isl,#ffce4f) -40%, #201a45 70%);
  border:2.5px solid var(--isl,#ffce4f);
  box-shadow:0 6px 16px -6px #000b;
}
.island-intro{
  font-size:1.08rem; margin-bottom:14px; color:var(--gold1); font-style:italic;
  background:#ffce4f12; border-left:3px solid var(--gold2);
  padding:10px 14px; border-radius:0 14px 14px 0;
}
.prompt{font-size:1.28rem; font-weight:bold; margin-bottom:8px; line-height:1.35}
.scene-count{color:var(--muted); font-size:.9rem}
.option-list{list-style:none; display:flex; flex-direction:column; gap:12px; margin:12px 0 18px}
.option-btn{
  width:100%; text-align:left; font-size:1.1rem; padding:15px 18px; border-radius:18px;
  background:linear-gradient(180deg,#463a8d,#382f73);
  box-shadow:0 4px 0 #251e55, 0 8px 16px -8px #0009;
  border:1px solid #6c5ce744;
}
.option-btn:hover{border-color:var(--gold2); filter:brightness(1.1)}
.option-btn:active{transform:translateY(3px); box-shadow:0 1px 0 #251e55}
.toolbar{display:flex; flex-wrap:wrap; gap:10px; margin-top:8px}

/* ---------- Feedback ---------- */
.spark-hero{position:relative; margin:8px auto 12px; width:fit-content}
.burst{position:relative}
.burst::before{
  content:""; position:absolute; inset:-38px; border-radius:50%; z-index:-1;
  background:
    repeating-conic-gradient(from 8deg, #ffce4f14 0deg 8deg, transparent 8deg 32deg),
    radial-gradient(circle, #ffce4f2b 0%, #ff8fb112 45%, transparent 70%);
  -webkit-mask-image:radial-gradient(circle, #000 30%, transparent 72%);
  mask-image:radial-gradient(circle, #000 30%, transparent 72%);
  animation:spin 16s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.feedback-msg{font-size:1.7rem; color:var(--gold2); margin:10px 0 18px; text-shadow:0 2px 14px #ffb34755}
.float{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.pop{animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
@keyframes pop{0%{transform:scale(.3)}100%{transform:scale(1)}}

/* ---------- Constelación ---------- */
.constellation{
  width:100%; height:auto; border-radius:20px; margin:10px 0 16px;
  border:1px solid #5647ab66;
  box-shadow:0 14px 30px -12px #000c, 0 0 40px -18px var(--violet2) inset;
}
.profile-card{
  background:linear-gradient(180deg,#2a224f,#221b47);
  border:1px solid #ffce4f2e; border-radius:20px; padding:18px; margin-bottom:16px;
  box-shadow:0 10px 24px -12px #000a;
}
.profile-line{font-size:1.15rem; margin-bottom:9px}
.dim-top{color:var(--gold2); font-size:1.32rem; text-shadow:0 0 16px #ffce4f55}
.dim-second{color:var(--teal); text-shadow:0 0 12px #7fe3ff44}
.profile-desc{margin-bottom:9px}
.profile-power{color:var(--gold1)}

/* ---------- Carta ---------- */
.letter{
  width:100%; font-family:Georgia,'Times New Roman',serif; font-size:1.08rem; line-height:1.62;
  background:linear-gradient(180deg,#fdf7e3,#f8eecb); color:#41341a;
  border:1px solid #d9c07e; border-radius:16px;
  padding:18px; margin:10px 0 14px; resize:vertical;
  box-shadow:0 10px 24px -10px #0008, 0 1px 0 #fff9 inset;
}

/* ---------- Guía familiar ---------- */
.family-intro{margin-bottom:14px}
.family-list{list-style:none; display:flex; flex-direction:column; gap:11px; margin-bottom:18px; font-size:1.08rem}
.family-list li{
  background:linear-gradient(180deg,#2a224f,#231c48);
  border:1px solid #5647ab44; border-radius:16px; padding:13px 16px;
  box-shadow:0 6px 14px -8px #000a;
}

#live{position:absolute; width:1px; height:1px; overflow:hidden; clip-path:inset(50%)}

/* ---------- Botón de sonido flotante ---------- */
.sound-btn{
  position:fixed; top:14px; right:14px; z-index:10;
  width:52px; height:52px; border-radius:50%; border:1px solid #5647ab88;
  background:linear-gradient(180deg,#3a3078,#2b2360);
  font-size:1.35rem; cursor:pointer; color:var(--text);
  box-shadow:0 6px 16px -6px #000b;
  transition:transform .15s, filter .15s;
}
.sound-btn:hover{filter:brightness(1.15); transform:scale(1.06)}
.sound-btn:active{transform:scale(.96)}

/* ---------- Pistas de teclado (solo escritorio con mouse) ---------- */
.key-hint{
  display:none; flex:0 0 auto;
  width:26px; height:26px; margin-right:12px; border-radius:8px;
  background:#241d52; border:1px solid #6c5ce766; color:var(--gold1);
  font-size:.85rem; font-weight:bold;
  align-items:center; justify-content:center;
}
@media (hover:hover) and (pointer:fine){
  .key-hint{display:inline-flex}
  .option-btn{display:flex; align-items:center}
}

/* ---------- Escritorio ---------- */
@media (min-width:900px){
  body{padding:34px 24px 44px}
  #app{max-width:920px}
  .card{padding:36px 42px; border-radius:32px}
  h1,h2{font-size:1.9rem}
  .game-title{font-size:4rem}
  .subtitle{font-size:1.25rem}
  .island-grid{grid-template-columns:repeat(3,1fr); gap:18px}
  .island-btn{min-height:186px}
  .island-bubble{width:108px; height:108px}
  .scene-art{width:110px; height:110px}
  .prompt{font-size:1.45rem}
  .option-btn{font-size:1.18rem; padding:17px 20px}
  .island-intro{font-size:1.16rem}
  .constellation{max-height:430px}
  .profile-line{font-size:1.28rem}
  .dim-top{font-size:1.5rem}
  .letter{font-size:1.14rem}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important; transition:none !important}
  body::after{opacity:.7}
}
@media (max-width:420px){
  body{padding:12px 10px 22px}
  .card{padding:20px 15px; border-radius:24px}
  h1,h2{font-size:1.38rem}
  .game-title{font-size:2.4rem}
  .island-grid{grid-template-columns:repeat(2,1fr); gap:11px}
  .island-btn{min-height:152px}
  .island-bubble,.scene-art{width:84px; height:84px}
}
</style>
</head>

/* ---------- Posiciones de las estrellas en la constelación (viewBox 100×70) ---------- */
const STAR_POS = {
  crear: { x: 50, y: 12 },
  ayudar: { x: 81, y: 26 },
  explorar: { x: 74, y: 52 },
  construir: { x: 26, y: 52 },
  expresar: { x: 19, y: 26 },
  naturaleza: { x: 50, y: 38 },
};

/* ---------- Motor ---------- */

function newScores() {
  const s = {};
  for (const d of DIMS) s[d] = 0;
  return s;
}

function applyChoice(scores, islandIdx, sceneIdx, optIdx) {
  const opt = ISLANDS[islandIdx].scenes[sceneIdx].options[optIdx];
  if (!opt) throw new Error(`Opción inválida: ${islandIdx}/${sceneIdx}/${optIdx}`);
  const out = { ...scores };
  for (const [d, n] of Object.entries(opt.w)) out[d] = (out[d] || 0) + n;
  return out;
}

/* Devuelve [dimPrincipal, dimSecundaria] con desempate estable por orden de DIMS. */
function computePurpose(scores) {
  const ranked = DIMS.map((d, i) => ({ d, s: scores[d] || 0, i }))
    .sort((a, b) => b.s - a.s || a.i - b.i);
  return { top: ranked[0].d, second: ranked[1].d, ranked };
}

function buildLetter(name, lang, top, second) {
  const t = PROFILES[top], s = PROFILES[second];
  const who = (name && name.trim()) ? name.trim() : STR[lang].defaultName;
  if (lang === 'es') {
    return `Hola, ${who} del futuro:

Hoy viajé por las islas de Spark y descubrí algo sobre mí: mi chispa brilla fuerte cuando puedo ${t.doing.es}. También me gusta ${s.doing.es}.

Quiero acordarme de esto: ${t.reminder.es}.

Cuando leas esta carta, espero que sigas haciendo brillar tu chispa. Y si cambió, ¡también está bien! Las estrellas se mueven.

— ${who} de hoy ✨`;
  }
  if (lang === 'pt') {
    return `Olá, ${who} do futuro:

Hoje eu viajei pelas ilhas de Spark e descobri algo sobre mim: minha faísca brilha forte quando eu posso ${t.doing.pt}. Também gosto de ${s.doing.pt}.

Quero lembrar disto: ${t.reminder.pt}.

Quando você ler esta carta, espero que ainda esteja fazendo sua faísca brilhar. E se mudou, tudo bem também! As estrelas se movem.

— ${who} de hoje ✨`;
  }
  return `Hello, future ${who}:

Today I traveled through the Spark islands and discovered something about myself: my spark shines bright when I can ${t.doing.en}. I also like to ${s.doing.en}.

I want to remember this: ${t.reminder.en}.

When you read this letter, I hope you are still making your spark shine. And if it changed, that is okay too! Stars move.

— today's ${who} ✨`;
}

/* Datos listos para dibujar la constelación: posición, radio y brillo por estrella. */
function constellationData(scores) {
  const max = Math.max(1, ...DIMS.map(d => scores[d] || 0));
  return DIMS.map(d => ({
    dim: d,
    x: STAR_POS[d].x,
    y: STAR_POS[d].y,
    r: 1.6 + 3.4 * ((scores[d] || 0) / max),
    glow: (scores[d] || 0) / max,
    score: scores[d] || 0,
  }));
}

const ChispaLogic = {
  DIMS, LANGS, MIN_ISLANDS, STR, PROFILES, ISLANDS, STAR_POS,
  newScores, applyChoice, computePurpose, buildLetter, constellationData,
};

if (typeof module !== 'undefined' && module.exports) module.exports = ChispaLogic;
if (typeof window !== 'undefined') window.ChispaLogic = ChispaLogic;

  /* ---------- Sonido (WebAudio, 100% sintetizado, sin archivos) ---------- */
  const Sound = (function () {
    const AC = window.AudioContext || window.webkitAudioContext;
    let ctx = null, master = null, musicGain = null, enabled = false, musicNodes = [];
    // Acorde suave por pantalla/isla (tríadas graves, timbre triángulo)
    const CHORDS = {
      title: [220, 277.18, 329.63], colores: [233.08, 293.66, 349.23],
      faro: [196, 246.94, 293.66], bosque: [174.61, 220, 261.63],
      taller: [207.65, 261.63, 311.13], historias: [246.94, 311.13, 369.99],
      mapa: [220, 261.63, 329.63], constellation: [261.63, 329.63, 392],
    };
    let currentKey = 'title';
    function ensure() {
      if (!AC) return false;
      try {
        if (!ctx) {
          ctx = new AC();
          master = ctx.createGain(); master.gain.value = 0.5; master.connect(ctx.destination);
          musicGain = ctx.createGain(); musicGain.gain.value = 0.14; musicGain.connect(master);
        }
        if (ctx.state === 'suspended') ctx.resume();
        return true;
      } catch (e) { return false; }
    }
    function stopMusic() {
      for (const n of musicNodes) { try { n.stop ? n.stop() : n.disconnect(); } catch (e) { /* ya detenido */ } }
      musicNodes = [];
    }
    function startMusic(key) {
      if (key) currentKey = key;
      if (!enabled || !ensure()) return;
      stopMusic();
      const freqs = CHORDS[currentKey] || CHORDS.title;
      freqs.forEach((f, i) => {
        const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f / 2;
        o.detune.value = i * 3;
        const g = ctx.createGain(); g.gain.value = 0;
        g.gain.linearRampToValueAtTime(0.5 / (i + 1), ctx.currentTime + 2.2);
        o.connect(g); g.connect(musicGain); o.start();
        musicNodes.push(o, g);
      });
    }
    function blip(freq, dur, type, vol) {
      if (!enabled || !ensure()) return;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime + dur);
    }
    return {
      toggle() {
        enabled = !enabled;
        if (enabled && !ensure()) { enabled = false; return false; }
        if (enabled) startMusic(); else stopMusic();
        return enabled;
      },
      startMusic,
      chime() { blip(659.25, 0.18); setTimeout(() => blip(880, 0.22), 90); },
      star() { [523.25, 659.25, 783.99].forEach((f, i) => setTimeout(() => blip(f, 0.28, 'triangle', 0.2), i * 110)); },
      arpeggio() { [392, 493.88, 587.33, 783.99, 987.77].forEach((f, i) => setTimeout(() => blip(f, 0.5, 'sine', 0.16), i * 160)); },
      get on() { return enabled; },
    };
  })();

  /* ---------- Lectura en voz alta ---------- */
  function canSpeak() { return typeof window.speechSynthesis !== 'undefined' && typeof window.SpeechSynthesisUtterance !== 'undefined'; }

  function speak(text) {
    if (!canSpeak()) return;
    if (state.speaking) { window.speechSynthesis.cancel(); state.speaking = false; syncSpeakBtns(); return; }
    const u = new window.SpeechSynthesisUtterance(text);
    u.lang = { es: 'es-ES', en: 'en-US', pt: 'pt-BR' }[state.lang];
    u.rate = 0.95;
    u.onend = () => { state.speaking = false; syncSpeakBtns(); };
    state.speaking = true; syncSpeakBtns();
    window.speechSynthesis.speak(u);
  }

  function syncSpeakBtns() {
    for (const b of document.querySelectorAll('[data-speak]')) {
      b.querySelector('.spk-label').textContent = state.speaking ? t('stopReading') : t('readAloud');
      b.setAttribute('aria-pressed', state.speaking ? 'true' : 'false');
    }
  }

  function speakBtn(getText) {
    if (!canSpeak()) return '';
    speakBtn._targets.push(getText);
    return `<button type="button" class="btn btn-soft" data-speak="${speakBtn._targets.length - 1}" aria-pressed="false">🔊 <span class="spk-label">${t('readAloud')}</span></button>`;
  }
  speakBtn._targets = [];

  /* ---------- Utilidades ---------- */
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function render(html, screenName) {
    speakBtn._targets = [];
    if (canSpeak()) window.speechSynthesis.cancel();
    state.speaking = false;
    app.innerHTML = html;
    app.dataset.screen = screenName;
    syncSoundBtn();
    const h = app.querySelector('h1, h2');
    if (h) { h.setAttribute('tabindex', '-1'); h.focus(); }
  }

  function announce(msg) {
    const live = document.getElementById('live');
    if (live) live.textContent = msg;
  }

  function download(filename, text) {
    try {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    } catch (e) { /* jsdom / navegadores viejos */ }
  }

  function screenMap() {
    Sound.startMusic('mapa');
    const left = Math.max(0, L.MIN_ISLANDS - state.visited.length);
    const allDone = state.visited.length === L.ISLANDS.length;
    const islands = L.ISLANDS.map((isl, i) => {
      const done = state.visited.includes(isl.id);
      return `<li><button type="button" class="island-btn ${done ? 'done' : ''}" data-island="${i}" ${done ? 'disabled' : ''}
        style="--isl:${ISLAND_COLOR[isl.id]}"
        aria-label="${esc(isl.name[state.lang])}${done ? ', ' + t('visited') : ''}">
        <span class="island-bubble">${islandArt(isl.id, 74)}</span>
        <span class="island-name">${esc(isl.name[state.lang])}</span>
        ${done ? '<span class="island-star" aria-hidden="true">⭐</span>' : ''}
      </button></li>`;
    }).join('');

    const stars = L.ISLANDS.map(isl =>
      `<span class="${state.visited.includes(isl.id) ? 'on' : 'off'}" aria-hidden="true">⭐</span>`).join('');

    render(`

      </div>`, 'map');

    for (const b of app.querySelectorAll('[data-island]')) {
      b.addEventListener('click', () => {
        state.current = Number(b.dataset.island);

        screenIsland(true);

    const bc = document.getElementById('btn-constellation');
    if (bc) bc.addEventListener('click', screenConstellation);

  function screenIsland(showIntro) {
    const isl = L.ISLANDS[state.current];
    if (showIntro) Sound.startMusic(isl.id);
    const scene = isl.scenes[state.scene];
    const total = isl.scenes.length;
    const options = scene.options.map((o, i) =>
      `<li><button type="button" class="btn option-btn" data-opt="${i}" aria-keyshortcuts="${i + 1}">
        <span class="key-hint" aria-hidden="true">${i + 1}</span>${esc(o.text[state.lang])}</button></li>`).join('');

    const introBlock = showIntro ? `<p class="island-intro">${esc(isl.intro[state.lang])}</p>` : '';
    const readText = `${showIntro ? isl.intro[state.lang] + '. ' : ''}${scene.prompt[state.lang]} ${t('chooseHint')} ${scene.options.map(o => o.text[state.lang]).join('. ')}`;

    render(`
      <div class="card">
        <div class="row-top">
          <span class="scene-art" style="--isl:${ISLAND_COLOR[isl.id]}">${islandArt(isl.id, 72)}</span>
          <div>
            <h1>${esc(isl.name[state.lang])}</h1>

          </div>

        ${introBlock}
        <p class="prompt">${esc(scene.prompt[state.lang])}</p>
        <p class="hint">${t('chooseHint')}</p>
        <ul class="option-list" role="list">${options}</ul>
        <div class="toolbar">
          ${speakBtn(() => readText)}
          <button type="button" id="btn-back" class="btn btn-soft">↩ ${t('backToMap')}</button>
        </div>
      </div>`, 'island');

    wireSpeak();
    document.getElementById('btn-back').addEventListener('click', screenMap);
    for (const b of app.querySelectorAll('[data-opt]')) {
      b.addEventListener('click', () => {
        state.scores = L.applyChoice(state.scores, state.current, state.scene, Number(b.dataset.opt));
        const pool = t('feedback');
        const msg = pool[(state.visited.length * 3 + state.scene * 2 + Number(b.dataset.opt)) % pool.length];
        announce(msg);
        if (state.scene + 1 < total) {
          Sound.chime();
          state.scene += 1;
          screenFeedback(msg, () => screenIsland(false));
        } else {
          Sound.star();
          if (!state.visited.includes(isl.id)) state.visited.push(isl.id);
          screenFeedback(msg, screenMap, true);
        }
      });
    }
  }

  function constellationSVG(data, purpose, forExport) {
    const defs = `<defs>
      <radialGradient id="csky" cx="60%" cy="8%" r="110%">
        <stop offset="0%" stop-color="#33296b"/><stop offset="45%" stop-color="#221b4e"/><stop offset="100%" stop-color="#140f30"/>
      </radialGradient>
      <radialGradient id="cneb" cx="24%" cy="78%" r="55%">
        <stop offset="0%" stop-color="#6c5ce7" stop-opacity=".28"/><stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="cline" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffe9a3"/><stop offset="100%" stop-color="#ffb347"/>
      </linearGradient>
    </defs>`;
    // Estrellitas decorativas fijas del cielo
    const deco = [[9,8,.5],[21,14,.35],[38,6,.45],[63,20,.3],[90,9,.5],[95,38,.35],[86,62,.45],[60,64,.3],[36,63,.4],[8,44,.35],[13,60,.5],[70,33,.25]]
      .map(([x, y, r]) => `<circle cx="${x}" cy="${y}" r="${r}" fill="#fff" opacity=".55"/>`).join('');
    const lines = [];
    const topStars = purpose.ranked.slice(0, 3).map(r => r.d);
    for (let i = 0; i < topStars.length - 1; i++) {
      const a = L.STAR_POS[topStars[i]], b = L.STAR_POS[topStars[i + 1]];
      lines.push(`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="url(#cline)" stroke-width="0.6" stroke-linecap="round" opacity="0.85" stroke-dasharray="1.6 1.1"/>`);
    }
    const stars = data.map(s => {
      const label = L.PROFILES[s.dim].label[state.lang];
      const isTop = s.dim === purpose.top;
      return `<g>
        <circle cx="${s.x}" cy="${s.y}" r="${(s.r * 2.4).toFixed(2)}" fill="${isTop ? '#ffce4f' : '#ffe9a3'}" opacity="${(0.07 + s.glow * 0.14).toFixed(2)}"/>
        <circle cx="${s.x}" cy="${s.y}" r="${(s.r * 1.5).toFixed(2)}" fill="${isTop ? '#ffce4f' : '#ffe9a3'}" opacity="${(0.12 + s.glow * 0.2).toFixed(2)}"/>
        <circle cx="${s.x}" cy="${s.y}" r="${s.r.toFixed(2)}" fill="${isTop ? '#ffd75e' : '#fff7dd'}"/>
        <text x="${s.x}" y="${s.y + s.r + 5.5}" text-anchor="middle" font-size="3.8" font-weight="bold" letter-spacing=".3"
          fill="${isTop ? '#ffe9a3' : '#c5b9f2'}" font-family="inherit">${label}</text>
      </g>`;
    }).join('');
    return `<svg id="const-svg" viewBox="0 0 100 70" class="constellation" role="img"
      aria-label="${t('constAria')}">${defs}
      <rect width="100" height="70" fill="url(#csky)" rx="${forExport ? 0 : 3}"/>
      <rect width="100" height="70" fill="url(#cneb)" rx="${forExport ? 0 : 3}"/>
      ${deco}${lines.join('')}${stars}</svg>`;
  }

  function exportPNG(purpose) {
    try {
      const data = L.constellationData(state.scores);
      const svg = constellationSVG(data, purpose, true).replace('class="constellation"', 'width="1000" height="700"');
      const canvas = document.createElement('canvas');
      canvas.width = 1000; canvas.height = 760;
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('no canvas');
      const img = new Image();
      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.fillStyle = '#1b1740'; ctx.fillRect(0, 0, 1000, 760);
        ctx.drawImage(img, 0, 0, 1000, 700);
        ctx.fillStyle = '#ffe9a3'; ctx.font = '28px sans-serif'; ctx.textAlign = 'center';
        const who = state.name ? `${state.name} · ` : '';
        ctx.fillText(`${who}${t('sparkIs')} ${L.PROFILES[purpose.top].label[state.lang]} ✨`, 500, 738);
        URL.revokeObjectURL(url);
        const a = document.createElement('a');
        a.download = t('pngFile');
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a); a.click(); a.remove();
        announce(t('pngSaved'));
      };
      img.onerror = () => { URL.revokeObjectURL(url); announce(t('pngFail')); };
      img.src = url;
    } catch (e) { announce(t('pngFail')); }
  }

  function screenConstellation() {
    Sound.startMusic('constellation');
    Sound.arpeggio();
    const purpose = L.computePurpose(state.scores);
    const data = L.constellationData(state.scores);
    const topP = L.PROFILES[purpose.top], secP = L.PROFILES[purpose.second];
    // Con nombre, el título va en minúscula tras la coma: "Luna, tu constelación"
    const rawTitle = t('constTitle');
    const title = state.name ? rawTitle.charAt(0).toLowerCase() + rawTitle.slice(1) : rawTitle;
    const who = state.name ? `${esc(state.name)}, ` : '';
    const readText = `${state.name ? state.name + '. ' : ''}${t('sparkIs')} ${topP.label[state.lang]}, ${t('withTouch')} ${secP.label[state.lang]}. ${topP.desc[state.lang]} ${t('superpower')}: ${topP.power[state.lang]}.`;

    render(`
      <div class="card">
        <h1>${who}${title} ✨</h1>
        ${constellationSVG(data, purpose, false)}
        <div class="profile-card">
          <p class="profile-line">${t('sparkIs')} <strong class="dim-top">${topP.label[state.lang]}</strong> ${t('withTouch')} <strong class="dim-second">${secP.label[state.lang]}</strong></p>
          <p class="profile-desc">${topP.desc[state.lang]}</p>
          <p class="profile-power">⚡ ${t('superpower')}: <strong>${topP.power[state.lang]}</strong></p>
        </div>
        <div class="toolbar">
          ${speakBtn(() => readText)}
          <button type="button" id="btn-png" class="btn btn-soft">🖼 ${t('downloadPng')}</button>
          <button type="button" id="btn-family" class="btn btn-soft">👪 ${t('familyGuide')}</button>
        </div>
        <button type="button" id="btn-letter" class="btn btn-big">✉ ${t('writeLetter')}</button>
      </div>`, 'constellation');

    wireSpeak();
    document.getElementById('btn-letter').addEventListener('click', () => screenLetter(purpose));
    document.getElementById('btn-png').addEventListener('click', () => exportPNG(purpose));
    document.getElementById('btn-family').addEventListener('click', () => screenFamily(purpose));
  }

  function screenFamily(purpose) {
    render(`
      <div class="card">
        <h1>${t('familyTitle')}</h1>
        <p class="family-intro">${t('familyIntro')}</p>
        <ul class="family-list" role="list">
          <li>${t('familyQ1')}</li><li>${t('familyQ2')}</li><li>${t('familyQ3')}</li>
        </ul>
        <div class="toolbar">
          ${speakBtn(() => [t('familyIntro'), t('familyQ1'), t('familyQ2'), t('familyQ3')].join(' '))}
          <button type="button" id="btn-close-family" class="btn btn-big">${t('close')}</button>
        </div>
      </div>`, 'family');
    wireSpeak();
    document.getElementById('btn-close-family').addEventListener('click', () => screenConstellation());
  }

  function screenLetter(purpose) {
    const letter = L.buildLetter(state.name, state.lang, purpose.top, purpose.second);
    render(`
      <div class="card">
        <h1>${t('letterTitle')} ✉</h1>
        <p class="hint">${t('letterHint')}</p>
        <textarea id="letter-text" class="letter" rows="12" aria-label="${t('letterTitle')}">${esc(letter)}</textarea>
        <div class="toolbar">
          ${speakBtn(() => document.getElementById('letter-text').value)}
          <button type="button" id="btn-dl-letter" class="btn btn-soft">💾 ${t('downloadLetter')}</button>
        </div>
        <button type="button" id="btn-replay" class="btn btn-big">🔁 ${t('playAgain')}</button>
      </div>`, 'letter');

    wireSpeak();
    document.getElementById('btn-dl-letter').addEventListener('click', () => {
      download(t('letterFile'), document.getElementById('letter-text').value);
    });
    document.getElementById('btn-replay').addEventListener('click', () => {
      state.visited = []; state.scores = L.newScores(); state.current = null; state.scene = 0;
      screenTitle();
    });
  }

  function wireSpeak() {
    for (const b of app.querySelectorAll('[data-speak]')) {
      b.addEventListener('click', () => {
        const get = speakBtn._targets[Number(b.dataset.speak)];
        speak(typeof get === 'function' ? get() : String(get));
      });
    }
  }

  /* ---------- Botón de sonido flotante (persiste entre pantallas) ---------- */
  (function () {
    const b = document.createElement('button');
    b.type = 'button'; b.id = 'btn-sound'; b.className = 'sound-btn';
    b.addEventListener('click', () => { Sound.toggle(); Sound.startMusic(); syncSoundBtn(); });
    document.body.appendChild(b);
  })();

  /* ---------- Atajos de teclado (escritorio): 1/2/3 eligen opción, Enter/Espacio sigue ---------- */
  document.addEventListener('keydown', e => {
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const screen = app.dataset.screen;
    if (screen === 'island' && /^(Digit|Numpad)[123]$/.test(e.code)) {
      const opt = app.querySelectorAll('[data-opt]')[Number(e.code.slice(-1)) - 1];
      if (opt) { e.preventDefault(); opt.click(); }
    } else if (screen === 'feedback' && (e.code === 'Enter' || e.code === 'Space') && tag !== 'BUTTON') {
      const next = document.getElementById('btn-next');
      if (next) { e.preventDefault(); next.click(); }
    }
  });

  /* ---------- Inicio ---------- */
  document.documentElement.lang = state.lang;
  screenTitle();
  syncSoundBtn();
})();

</script>
</body>
</html>
